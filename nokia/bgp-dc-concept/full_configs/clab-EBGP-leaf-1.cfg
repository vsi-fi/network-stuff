    network-instance default {
        router-id 1.1.1.3
        ip-forwarding {
            receive-ipv4-check false
        }
        interface ethernet-1/1.100 {
        }
        interface ethernet-1/2.100 {
        }
        interface lo0.100 {
        }
        protocols {
            bgp {
                admin-state enable
                autonomous-system 4201000099
                router-id 1.1.1.3
                dynamic-neighbors {
                    interface ethernet-1/1.100 {
                        peer-group DC-AGGR
                    }
                    interface ethernet-1/2.100 {
                        peer-group DC-AGGR
                    }
                }
                afi-safi ipv4-unicast {
                    admin-state enable
                    ipv4-unicast {
                        advertise-ipv6-next-hops true
                        receive-ipv6-next-hops true
                    }
                }
                group DC-AGGR {
                    peer-as 4201000001
                    export-policy [
                        IPV4-BGP-EXPORT
                    ]
                    import-policy [
                        IPV4-BGP-IMPORT
                    ]
                    afi-safi ipv4-unicast {
                    }
                    local-as {
                        as-number 4201000099
                    }
                }
            }
        }
    }
    network-instance mgmt {
        type ip-vrf
        admin-state enable
        description "Management network instance"
        interface mgmt0.0 {
        }
        protocols {
            linux {
                import-routes true
                export-routes true
                export-neighbors true
            }
        }
    }
    interface ethernet-1/1 {
        admin-state enable
        vlan-tagging true
        subinterface 100 {
            ipv4 {
                admin-state enable
            }
            ipv6 {
                admin-state enable
                router-advertisement {
                    router-role {
                        admin-state enable
                        max-advertisement-interval 10
                        min-advertisement-interval 4
                    }
                }
            }
            vlan {
                encap {
                    single-tagged {
                        vlan-id 100
                    }
                }
            }
        }
    }
    interface ethernet-1/2 {
        admin-state enable
        vlan-tagging true
        subinterface 100 {
            ipv4 {
                admin-state enable
            }
            ipv6 {
                admin-state enable
                router-advertisement {
                    router-role {
                        admin-state enable
                        max-advertisement-interval 10
                        min-advertisement-interval 4
                    }
                }
            }
            vlan {
                encap {
                    single-tagged {
                        vlan-id 100
                    }
                }
            }
        }
    }
    interface lo0 {
        subinterface 100 {
            ipv4 {
                admin-state enable
                address 192.168.100.1/32 {
                }
            }
        }
    }
    interface mgmt0 {
        admin-state enable
        subinterface 0 {
            admin-state enable
            ipv4 {
                admin-state enable
                dhcp-client {
                }
            }
            ipv6 {
                admin-state enable
                dhcp-client {
                }
            }
        }
    }
    interface system0 {
        subinterface 0 {
            ipv4 {
                address 1.1.1.3/32 {
                }
            }
        }
    }
    routing-policy {
        prefix-set IPV4-DEFAULT {
            prefix 0.0.0.0/0 mask-length-range exact {
            }
        }
        policy IPV4-BGP-EXPORT {
            default-action {
                policy-result reject
            }
            statement LOCAL {
                match {
                    protocol local
                }
                action {
                    policy-result accept
                }
            }
        }
        policy IPV4-BGP-IMPORT {
            default-action {
                policy-result reject
            }
            statement DEFAULT {
                match {
                    prefix {
                        prefix-set IPV4-DEFAULT
                    }
                }
                action {
                    policy-result accept
                }
            }
        }
    }
